<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Gospel Library Reader (Nav + Player)</title>
  <style>
    :root{
      --bg:#0b0f14; --fg:#eef2f7; --muted:#a9b4c0;
      --hl:#ffe27a; --hlBg:rgba(255,226,122,.18);
      --btnBg:rgba(255,255,255,.08); --btnBgHover:rgba(255,255,255,.12);
      --btnBorder:rgba(255,255,255,.14);
      --w0Bg: rgba(255,255,255,0.06);
      --w1Bg: rgba(255,255,255,0.00);
      --cardBg: rgba(255,255,255,.06);
      --cardBorder: rgba(255,255,255,.12);
      --chipBg: rgba(255,255,255,.08);
    }

    *{box-sizing:border-box}
    html,body{height:100%;margin:0}
    body{
      background:var(--bg);
      color:var(--fg);
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;
      overflow:hidden;
      touch-action: manipulation;
    }

    .app{height:100dvh;width:100vw;display:flex;flex-direction:column;}

    .topbar{
      flex:0 0 auto;
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding: 10px 12px;
      gap: 10px;
      border-bottom: 1px solid rgba(255,255,255,.08);
    }
    .top-left{display:flex;flex-direction:column;gap:2px;min-width:0;}
    .ref{font-weight:800;font-size:16px;letter-spacing:.2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:58vw;}
    .status{color:var(--muted);font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:58vw;}
    .top-actions{display:flex;gap:8px;align-items:center;flex:0 0 auto;}

    .iconbtn{
      appearance:none;
      border:1px solid var(--btnBorder);
      background:var(--btnBg);
      color:var(--fg);
      border-radius:12px;
      width:44px;height:44px;
      font-size:20px;font-weight:850;
      display:flex;align-items:center;justify-content:center;
      cursor:pointer;
      transition:background 120ms ease, transform 120ms ease;
      user-select:none;
    }
    .iconbtn:hover{background:var(--btnBgHover)}
    .iconbtn:active{transform:translateY(.5px)}
    .iconbtn:disabled{opacity:.5;cursor:not-allowed;transform:none}

    .contentWrap{flex:1 1 auto;min-height:0;padding:14px 12px;}
    .contentScroll{
      height:100%;
      overflow:auto;
      -webkit-overflow-scrolling: touch;
      padding: 6px 4px 18px 4px;
      scrollbar-width: thin;
    }

    /* NAV UI */
    .chips{max-width: 820px;margin: 0 auto 10px auto;display:flex;flex-wrap:wrap;gap:8px;}
    .chip{
      border:1px solid rgba(255,255,255,.14);
      background: var(--chipBg);
      color: var(--fg);
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 12px;
      user-select:none;
      cursor:pointer;
    }
    .list{max-width: 820px;margin: 0 auto;display:flex;flex-direction:column;gap:10px;}
    .card{
      background: var(--cardBg);
      border: 1px solid var(--cardBorder);
      border-radius: 18px;
      padding: 12px 12px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      cursor:pointer;
      user-select:none;
      transition: background 120ms ease, transform 120ms ease;
    }
    .card:hover{ background: rgba(255,255,255,.075); }
    .card:active{ transform: translateY(.5px); }
    .card .meta{display:flex;flex-direction:column;min-width: 0;flex:1 1 auto;}
    .card .title{font-size:16px;font-weight:780;line-height:1.2;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
    .card .sub{color: var(--muted);font-size:12px;margin-top:2px;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
    .card .chev{opacity:.85;font-size:18px;flex:0 0 auto;padding-left:6px;}

    /* PLAYER */
    .verse{
      width:100%;
      max-width:720px;
      margin:0 auto;
      font-size:clamp(22px,4.4vw,40px);
      line-height:1.35;
      letter-spacing:.2px;
      text-wrap: pretty;
      user-select:none;
    }
    .seg{padding:.05em .14em;border-radius:.40em;transition:background 120ms linear,color 120ms linear, outline-color 120ms linear;}
    .seg.active{background: var(--hlBg);color: var(--hl);outline: 1px solid rgba(255,226,122,.35);outline-offset: 1px;}
    .word{display:inline-block;padding:.03em .10em;border-radius:.28em;margin:0 .03em 0 0;}
    .word.w0{background:var(--w0Bg);}
    .word.w1{background:var(--w1Bg);}
    .seg.active .word.w0{ background: rgba(255,255,255,0.10); }
    .seg.active .word.w1{ background: rgba(255,255,255,0.03); }

    .bottombar{
      flex:0 0 auto;
      display:flex;
      align-items:center;
      justify-content:space-around;
      gap:10px;
      padding: 10px 12px calc(10px + env(safe-area-inset-bottom));
      border-top: 1px solid rgba(255,255,255,.08);
      background: rgba(11,15,20,.98);
      backdrop-filter: blur(8px);
    }
    .navbtn{width:64px;height:54px;border-radius:16px;font-size:24px;}

    .hint{
      position: fixed;
      left: 50%;
      transform: translateX(-50%);
      bottom: calc(76px + env(safe-area-inset-bottom));
      color: rgba(255,255,255,.65);
      font-size: 12px;
      pointer-events:none;
      opacity:0;
      transition: opacity 200ms ease;
    }
    .hint.show{opacity:1}

    .rotateOverlay{
      position:fixed;inset:0;background: rgba(0,0,0,.72);
      display:none;align-items:center;justify-content:center;
      padding:24px;text-align:center;z-index:50;
    }
    .rotateOverlay .panel{
      max-width:420px;
      background: rgba(11,15,20,.94);
      border: 1px solid rgba(255,255,255,.14);
      border-radius: 18px;
      padding: 18px 16px;
    }
    .rotateOverlay .panel .t{font-weight:850;font-size:18px;margin-bottom:6px;}
    .rotateOverlay .panel .s{color:var(--muted);font-size:14px;line-height:1.35;}
    @media (orientation: landscape){ .rotateOverlay{display:flex;} }
    @media (prefers-reduced-motion: reduce){
      .seg{transition:none}
      .iconbtn:active{transform:none}
      .hint{transition:none}
      .card:active{transform:none}
    }
  </style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div class="top-left">
      <div class="ref" id="ref">Scriptures</div>
      <div class="status" id="status">Loading nav…</div>
    </div>
    <div class="top-actions" aria-label="Top navigation">
      <button class="iconbtn" id="btnBack" title="Previous (verse/back)" aria-label="Previous">◀</button>
      <button class="iconbtn" id="btnUp" title="Up" aria-label="Up">▲</button>
      <button class="iconbtn" id="btnForward" title="Next (verse/forward)" aria-label="Next">▶</button>
    </div>
  </div>

  <div class="contentWrap">
    <div class="contentScroll" id="contentScroll">
      <div class="chips" id="crumbs" style="display:none"></div>
      <div class="list" id="list"></div>
      <div class="verse" id="verse" style="display:none"></div>
    </div>
  </div>

  <div class="bottombar" id="bottombar" aria-label="Player controls" style="display:none">
    <button class="iconbtn navbtn" id="btnPrevSeg" title="Previous phrase" aria-label="Previous phrase">◀</button>
    <button class="iconbtn navbtn" id="btnReplaySeg" title="Replay phrase" aria-label="Replay phrase">⟲</button>
    <button class="iconbtn navbtn" id="btnNextSeg" title="Next phrase" aria-label="Next phrase">▶</button>
  </div>
</div>

<div class="hint" id="hint">Speaking…</div>

<div class="rotateOverlay" aria-hidden="true">
  <div class="panel">
    <div class="t">Rotate to portrait</div>
    <div class="s">This app is designed for portrait mode for easier reading.</div>
  </div>
</div>

<script>
(() => {
  // ---- Best-effort portrait lock ----
  async function tryLockPortrait(){
    try{ if (screen.orientation?.lock) await screen.orientation.lock("portrait"); }catch(_){}
  }
  window.addEventListener("load", tryLockPortrait);
  document.addEventListener("visibilitychange", () => { if (!document.hidden) tryLockPortrait(); });

  // ---- DOM ----
  const refEl = document.getElementById("ref");
  const statusEl = document.getElementById("status");
  const hintEl = document.getElementById("hint");
  const listEl = document.getElementById("list");
  const crumbsEl = document.getElementById("crumbs");
  const verseEl = document.getElementById("verse");
  const contentScroll = document.getElementById("contentScroll");
  const bottombarEl = document.getElementById("bottombar");

  const btnBack = document.getElementById("btnBack");
  const btnUp = document.getElementById("btnUp");
  const btnForward = document.getElementById("btnForward");

  const btnPrevSeg = document.getElementById("btnPrevSeg");
  const btnReplaySeg = document.getElementById("btnReplaySeg");
  const btnNextSeg = document.getElementById("btnNextSeg");

  const UI = {
    setRef: (t) => refEl.textContent = t,
    setStatus: (t) => statusEl.textContent = t,
    hint: (t) => {
      hintEl.textContent = t;
      hintEl.classList.add("show");
      clearTimeout(UI._ht);
      UI._ht = setTimeout(() => hintEl.classList.remove("show"), 800);
    },
    showNav: () => {
      listEl.style.display = "";
      crumbsEl.style.display = "";
      verseEl.style.display = "none";
      bottombarEl.style.display = "none";
    },
    showPlayer: () => {
      listEl.style.display = "none";
      crumbsEl.style.display = "none";
      verseEl.style.display = "";
      bottombarEl.style.display = "";
    },
    resetScroll: () => contentScroll.scrollTo({top:0, behavior:"instant"})
  };

  // ---- Fetch + cache ----
  const jsonCache = new Map();
  async function fetchJson(url){
    if (jsonCache.has(url)) return jsonCache.get(url);
    const res = await fetch(url, {cache:"force-cache"});
    if (!res.ok) throw new Error(`HTTP ${res.status} for ${url}`);
    const data = await res.json();
    jsonCache.set(url, data);
    return data;
  }
  function normalizeHref(href){
    if (!href) return href;
    if (href.startsWith("http://") || href.startsWith("https://")) return href;
    if (href.startsWith("/")) return href.slice(1);
    return href;
  }

  // ---- App state ----
  const App = {
    navRoot: null,

    // current drilldown selection
    sel: { workIndex:null, bookIndex:null, segmentIndex:null },

    // current chapter JSON when in player/chapter
    chapterJson: null,
    verseIndex: 0,

    // player TTS segment state
    speaking: false,
    segments: [],
    segSpans: [],
    segIndex: 0,

    // internal history stack
    hist: [],
    histIndex: -1,
  };

  function isPlayerView(){ return verseEl.style.display !== "none"; }

  // ---- History helpers ----
  function canBack(){ return App.histIndex > 0; }
  function canForward(){ return App.histIndex < App.hist.length - 1; }

  function pushState(st){
    App.hist.splice(App.histIndex + 1);
    App.hist.push(JSON.parse(JSON.stringify(st)));
    App.histIndex = App.hist.length - 1;
    updateTopButtons();
  }

  function currentState(){ return App.hist[App.histIndex] || null; }

  function restoreState(st){
    if (!st || !App.navRoot) return;
    const v = st.view;

    if (v === "home") return renderHome(false);
    if (v === "work") return renderWork(st.workIndex, false);
    if (v === "book") return renderBook(st.workIndex, st.bookIndex, false);
    if (v === "chapter") return renderChapter(st.workIndex, st.bookIndex, st.segmentIndex, false);
    if (v === "player") return renderPlayerFromState(st, false);
  }

  // ---- UI rendering primitives ----
  function renderCrumbs(items){
    crumbsEl.innerHTML = "";
    items.forEach(it => {
      const b = document.createElement("button");
      b.className = "chip";
      b.textContent = it.label;
      if (it.onClick) b.addEventListener("click", it.onClick);
      crumbsEl.appendChild(b);
    });
  }

  function renderCards(items){
    listEl.innerHTML = "";
    items.forEach(it => {
      const card = document.createElement("div");
      card.className = "card";
      card.setAttribute("role","button");
      card.setAttribute("tabindex","0");

      const meta = document.createElement("div");
      meta.className = "meta";

      const title = document.createElement("div");
      title.className = "title";
      title.textContent = it.title || "";

      meta.appendChild(title);

      if (it.sub){
        const sub = document.createElement("div");
        sub.className = "sub";
        sub.textContent = it.sub;
        meta.appendChild(sub);
      }

      const chev = document.createElement("div");
      chev.className = "chev";
      chev.textContent = it.chev ?? "›";

      card.appendChild(meta);
      card.appendChild(chev);

      const go = () => it.onClick && it.onClick();
      card.addEventListener("click", go);
      card.addEventListener("keydown", (e) => {
        if (e.key === "Enter" || e.key === " ") { e.preventDefault(); go(); }
      });

      listEl.appendChild(card);
    });

    UI.resetScroll();
  }

  // ---- Player (segments + TTS) ----
  function splitIntoSegments(text){
    const s = (text || "").replace(/\s+/g, " ").trim();
    const re = /[^,;:.!?]+(?:[,;:.!?]+|$)/g;
    const matches = s.match(re) || [];
    return matches.map(x => x.trim()).filter(Boolean);
  }

  function renderSegmentWords(span, segText){
    const words = segText.split(/\s+/).filter(Boolean);
    span.textContent = "";
    words.forEach((w, idx) => {
      const ws = document.createElement("span");
      ws.className = "word " + (idx % 2 === 0 ? "w0" : "w1");
      ws.textContent = w;
      span.appendChild(ws);
      if (idx < words.length - 1) span.appendChild(document.createTextNode(" "));
    });
  }

  function stopSpeech(){
    try{ speechSynthesis.cancel(); }catch(_){}
    App.speaking = false;
    updateTopButtons();
    updateBottomButtons();
  }

  function makeUtterance(text){
    const u = new SpeechSynthesisUtterance(text);
    u.lang = "en-GB";
    u.rate = 0.90;
    return u;
  }

  function setActiveSegment(i){
    if (App.segSpans[App.segIndex]) App.segSpans[App.segIndex].classList.remove("active");
    App.segIndex = Math.max(0, Math.min(i, App.segments.length - 1));
    if (App.segSpans[App.segIndex]) App.segSpans[App.segIndex].classList.add("active");
    App.segSpans[App.segIndex]?.scrollIntoView({block:"center", inline:"nearest", behavior:"smooth"});
    updateBottomButtons();
  }

  function speakSegment(i){
    if (!App.segments.length) return;
    stopSpeech();
    setActiveSegment(i);

    const segText = App.segments[App.segIndex];
    App.speaking = true;
    UI.setStatus(`${App.segIndex + 1}/${App.segments.length}`);
    UI.hint("Speaking…");
    updateTopButtons();
    updateBottomButtons();

    const u = makeUtterance(segText);
    u.onend = () => {
      App.speaking = false;
      UI.setStatus("Ready");
      updateTopButtons();
      updateBottomButtons();
    };
    u.onerror = () => {
      App.speaking = false;
      UI.setStatus("TTS error");
      updateTopButtons();
      updateBottomButtons();
    };
    speechSynthesis.speak(u);
  }

  function renderPlayerText(verseText){
    UI.showPlayer();
    verseEl.innerHTML = "";

    App.segments = splitIntoSegments(verseText);
    App.segSpans = [];
    App.segIndex = 0;

    App.segments.forEach((seg, idx) => {
      const span = document.createElement("span");
      span.className = "seg";
      renderSegmentWords(span, seg);
      span.addEventListener("click", () => speakSegment(idx));
      verseEl.appendChild(span);
      verseEl.appendChild(document.createTextNode(" "));
      App.segSpans.push(span);
    });

    App.segSpans[0]?.classList.add("active");
    updateBottomButtons();
    UI.setStatus("Ready");
    UI.resetScroll();
  }

  function updateBottomButtons(){
    const noSegs = App.segments.length === 0;
    btnPrevSeg.disabled = App.speaking || noSegs || App.segIndex <= 0;
    btnNextSeg.disabled = App.speaking || noSegs || App.segIndex >= App.segments.length - 1;
    btnReplaySeg.disabled = App.speaking || noSegs;
  }

  // ---- Top button enable/disable ----
  function updateTopButtons(){
    // ▲ always enabled once nav is loaded
    btnUp.disabled = !App.navRoot;

    if (isPlayerView()){
      const verses = App.chapterJson?.verses || [];
      btnBack.disabled = App.speaking || App.verseIndex <= 0 || verses.length === 0;
      btnForward.disabled = App.speaking || verses.length === 0 || App.verseIndex >= verses.length - 1;
      return;
    }

    // not in player -> history
    btnBack.disabled = !canBack();
    btnForward.disabled = !canForward();
  }

  // ---- Navigation renders ----
  function renderHome(push=true){
    stopSpeech();
    UI.showNav();
    UI.setRef("Scriptures");
    UI.setStatus("Choose a work");

    renderCrumbs([{label:"Scriptures", onClick: () => renderHome()}]);

    const works = App.navRoot?.scriptures?.works || [];
    renderCards(works.map((w, idx) => ({
      title: w.title,
      sub: "Work",
      onClick: () => renderWork(idx)
    })));

    if (push) pushState({view:"home"});
  }

  function renderWork(workIndex, push=true){
    stopSpeech();
    UI.showNav();

    const work = App.navRoot.scriptures.works[workIndex];
    App.sel.workIndex = workIndex;
    App.sel.bookIndex = null;
    App.sel.segmentIndex = null;

    UI.setRef(work.title);
    UI.setStatus("Choose a book");

    renderCrumbs([
      {label:"Scriptures", onClick: () => renderHome()},
      {label: work.title, onClick: () => renderWork(workIndex)}
    ]);

    const books = work.books || [];
    renderCards(books.map((b, bookIndex) => ({
      title: b.title,
      sub: `${b.segments?.length || 0} chapter(s)`,
      onClick: () => renderBook(workIndex, bookIndex)
    })));

    if (push) pushState({view:"work", workIndex});
  }

  function renderBook(workIndex, bookIndex, push=true){
    stopSpeech();
    UI.showNav();

    const work = App.navRoot.scriptures.works[workIndex];
    const book = work.books[bookIndex];

    App.sel.workIndex = workIndex;
    App.sel.bookIndex = bookIndex;
    App.sel.segmentIndex = null;

    UI.setRef(book.title);
    UI.setStatus("Choose a chapter");

    renderCrumbs([
      {label:"Scriptures", onClick: () => renderHome()},
      {label: work.title, onClick: () => renderWork(workIndex)},
      {label: book.title, onClick: () => renderBook(workIndex, bookIndex)}
    ]);

    const segs = book.segments || [];
    renderCards(segs.map((seg, segmentIndex) => ({
      title: seg.title,
      sub: "Chapter",
      onClick: () => renderChapter(workIndex, bookIndex, segmentIndex)
    })));

    if (push) pushState({view:"book", workIndex, bookIndex});
  }

  async function renderChapter(workIndex, bookIndex, segmentIndex, push=true){
    stopSpeech();
    UI.showNav();

    const work = App.navRoot.scriptures.works[workIndex];
    const book = work.books[bookIndex];
    const seg = book.segments[segmentIndex];
    const url = normalizeHref(seg.href);

    App.sel.workIndex = workIndex;
    App.sel.bookIndex = bookIndex;
    App.sel.segmentIndex = segmentIndex;

    UI.setRef(book.title);
    UI.setStatus(`Loading ${seg.title}…`);

    renderCrumbs([
      {label:"Scriptures", onClick: () => renderHome()},
      {label: work.title, onClick: () => renderWork(workIndex)},
      {label: book.title, onClick: () => renderBook(workIndex, bookIndex)},
      {label: seg.title, onClick: () => renderChapter(workIndex, bookIndex, segmentIndex)}
    ]);

    try{
      const ch = await fetchJson(url);
      App.chapterJson = ch;
      App.verseIndex = 0;

      const verses = ch.verses || [];
      UI.setStatus(`Choose a verse (${verses.length})`);

      renderCards(verses.map((v, verseIdx) => {
        const text = (v.text || "").trim();
        const preview = text.length > 80 ? text.slice(0,80) + "…" : text;
        return {
          title: `${seg.title}:${verseIdx + 1}`,
          sub: preview,
          onClick: () => renderPlayerVerse(workIndex, bookIndex, segmentIndex, verseIdx, ch)
        };
      }));

      if (push) pushState({view:"chapter", workIndex, bookIndex, segmentIndex});
      updateTopButtons();
    }catch(err){
      UI.setStatus("Failed to load chapter");
      renderCards([{
        title: "Could not load JSON",
        sub: String(err?.message || err),
        onClick: () => renderBook(workIndex, bookIndex)
      }]);
      updateTopButtons();
    }
  }

  function renderPlayerVerse(workIndex, bookIndex, segmentIndex, verseIdx, chapterJson, push=true){
    stopSpeech();

    const work = App.navRoot.scriptures.works[workIndex];
    const book = work.books[bookIndex];
    const seg = book.segments[segmentIndex];

    App.sel.workIndex = workIndex;
    App.sel.bookIndex = bookIndex;
    App.sel.segmentIndex = segmentIndex;

    App.chapterJson = chapterJson;
    App.verseIndex = verseIdx;

    const verseObj = (chapterJson.verses || [])[verseIdx] || {};
    const verseText = verseObj.text || "";

    UI.setRef(`${book.title} • ${seg.title}:${verseIdx + 1}`);
    renderPlayerText(verseText);

    if (push) pushState({view:"player", workIndex, bookIndex, segmentIndex, verseIndex: verseIdx});
    updateTopButtons();
  }

  async function renderPlayerFromState(st, push=true){
    // Re-fetch chapter json (cached) then open verse
    const {workIndex, bookIndex, segmentIndex} = st;
    const verseIdx = st.verseIndex;

    const work = App.navRoot.scriptures.works[workIndex];
    const book = work.books[bookIndex];
    const seg = book.segments[segmentIndex];
    const url = normalizeHref(seg.href);

    UI.setRef(`${book.title} • ${seg.title}:${verseIdx + 1}`);
    UI.setStatus("Loading verse…");
    UI.showPlayer();

    try{
      const ch = await fetchJson(url);
      App.chapterJson = ch;
      App.verseIndex = verseIdx;
      App.sel.workIndex = workIndex;
      App.sel.bookIndex = bookIndex;
      App.sel.segmentIndex = segmentIndex;

      const verseObj = (ch.verses || [])[verseIdx] || {};
      renderPlayerText(verseObj.text || "");

      if (push) pushState({view:"player", workIndex, bookIndex, segmentIndex, verseIndex: verseIdx});
      updateTopButtons();
    }catch(err){
      await renderChapter(workIndex, bookIndex, segmentIndex, push);
      UI.setStatus("Failed to load verse");
      updateTopButtons();
    }
  }

  // ---- Verse navigation in player ----
  function moveVerse(delta){
    const verses = App.chapterJson?.verses || [];
    const next = App.verseIndex + delta;
    if (next < 0 || next >= verses.length) return;

    const {workIndex, bookIndex, segmentIndex} = App.sel;
    if (workIndex == null || bookIndex == null || segmentIndex == null) return;

    renderPlayerVerse(workIndex, bookIndex, segmentIndex, next, App.chapterJson);
  }

  // ---- Up one level ----
  async function goUpOneLevel(){
    if (!App.navRoot) return;

    const st = currentState();
    if (!st) return;

    if (st.view === "player"){
      // back to chapter verse list
      return renderChapter(st.workIndex, st.bookIndex, st.segmentIndex);
    }
    if (st.view === "chapter"){
      return renderBook(st.workIndex, st.bookIndex);
    }
    if (st.view === "book"){
      return renderWork(st.workIndex);
    }
    if (st.view === "work"){
      return renderHome();
    }
    // home -> no-op
  }

  // ---- Event handlers ----
  btnPrevSeg.onclick = () => speakSegment(App.segIndex - 1);
  btnReplaySeg.onclick = () => speakSegment(App.segIndex);
  btnNextSeg.onclick = () => speakSegment(App.segIndex + 1);

  btnBack.onclick = () => {
    if (isPlayerView()) moveVerse(-1);
    else if (canBack()) { App.histIndex--; restoreState(App.hist[App.histIndex]); updateTopButtons(); }
  };

  btnForward.onclick = () => {
    if (isPlayerView()) moveVerse(1);
    else if (canForward()) { App.histIndex++; restoreState(App.hist[App.histIndex]); updateTopButtons(); }
  };

  btnUp.onclick = () => goUpOneLevel();

  // Stop speech when leaving
  window.addEventListener("pagehide", stopSpeech);

  // Optional swipe to change verses in player
  let touchStartX = 0;
  verseEl.addEventListener("touchstart", (e) => { touchStartX = e.changedTouches[0].clientX; }, {passive:true});
  verseEl.addEventListener("touchend", (e) => {
    const dx = e.changedTouches[0].clientX - touchStartX;
    if (Math.abs(dx) > 50){
      if (dx < 0) moveVerse(1);
      else moveVerse(-1);
    }
  }, {passive:true});

  // ---- Init ----
  async function init(){
    updateTopButtons();
    if (typeof speechSynthesis === "undefined"){
      UI.setStatus("No TTS");
      btnPrevSeg.disabled = btnReplaySeg.disabled = btnNextSeg.disabled = true;
    }

    try{
      // NOTE: If opened as file://, fetch may be blocked. Serve over HTTP.
      App.navRoot = await fetchJson("nav.json");
      renderHome(true);
      updateTopButtons();
    }catch(err){
      UI.showNav();
      UI.setRef("Scriptures");
      UI.setStatus("Could not load nav.json");
      renderCrumbs([{label:"Scriptures"}]);
      renderCards([{
        title: "nav.json not found / blocked",
        sub: "Tip: serve this folder over HTTP (python -m http.server) so fetch() can read nav.json.",
      },{
        title: "Error details",
        sub: String(err?.message || err),
      }]);
      updateTopButtons();
      pushState({view:"home"});
    }
  }

  init();
})();
</script>
</body>
</html>
