<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Verse Read-Along (Segment + Word Striping)</title>
  <style>
    :root{
      --bg:#0b0f14; --fg:#eef2f7; --muted:#a9b4c0;
      --hl:#ffe27a; --hlBg:rgba(255,226,122,.18);
      --btnBg:rgba(255,255,255,.08); --btnBgHover:rgba(255,255,255,.12);
      --btnBorder:rgba(255,255,255,.14);

      /* word striping */
      --w0Bg: rgba(255,255,255,0.06);
      --w1Bg: rgba(255,255,255,0.00);
      --wPadX: 0.10em;
      --wPadY: 0.03em;
      --wRadius: 0.28em;
    }

    *{box-sizing:border-box}
    html,body{height:100%;margin:0}
    body{background:var(--bg);color:var(--fg);font-family:system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;overflow:hidden}

    .app{height:100dvh;width:100vw;display:flex;flex-direction:column;padding:clamp(14px,2.8vw,28px);gap:clamp(10px,2vw,18px)}
    header{display:flex;align-items:baseline;justify-content:space-between;gap:12px;flex:0 0 auto}
    .ref{font-weight:800;font-size:clamp(16px,2.6vw,24px);white-space:nowrap}
    .status{color:var(--muted);font-size:clamp(12px,1.8vw,16px);white-space:nowrap}

    .verseWrap{flex:1 1 auto;display:flex;align-items:center;justify-content:center;min-height:0;padding:clamp(6px,1.6vw,12px)}
    .verse{width:min(1100px,100%);font-size:clamp(22px,3.2vw,44px);line-height:1.35;letter-spacing:.2px;user-select:none;text-wrap:pretty}

    .seg{
      padding:.05em .14em;
      border-radius:.40em;
      transition:background 120ms linear,color 120ms linear, outline-color 120ms linear;
    }
    .seg.active{
      background: var(--hlBg);
      color: var(--hl);
      outline: 1px solid rgba(255,226,122,.35);
      outline-offset: 1px;
    }

    .word{
      display:inline-block;
      padding: var(--wPadY) var(--wPadX);
      border-radius: var(--wRadius);
      margin: 0 .03em 0 0;
    }
    .word.w0{ background: var(--w0Bg); }
    .word.w1{ background: var(--w1Bg); }

    /* Keep striping visible even when active */
    .seg.active .word.w0{ background: rgba(255,255,255,0.10); }
    .seg.active .word.w1{ background: rgba(255,255,255,0.03); }

    footer{flex:0 0 auto;display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between}
    .controls{display:flex;gap:10px;flex-wrap:wrap;align-items:center}

    button{
      appearance:none;border:1px solid var(--btnBorder);background:var(--btnBg);color:var(--fg);
      border-radius:14px;padding:12px 16px;font-size:16px;font-weight:800;cursor:pointer;transition:background 120ms ease;
      min-width: 170px;
    }
    button:hover{background:var(--btnBgHover)}
    button:active{transform:translateY(.5px)}
    button:disabled{opacity:.5;cursor:not-allowed}

    .small{font-size:13px;color:var(--muted);display:flex;gap:10px;align-items:center;flex-wrap:wrap}
    select,input[type="range"]{background:transparent;color:var(--fg);border:1px solid var(--btnBorder);border-radius:10px;padding:8px 10px;font-size:14px}
    input[type="range"]{padding:0;height:34px;width:150px;border-radius:10px}

    @media (prefers-reduced-motion: reduce){
      .seg{transition:none}
      button:active{transform:none}
    }
  </style>
</head>
<body>
<div class="app">
  <header>
    <div class="ref">1 Nephi 1:1</div>
    <div class="status" id="status">Ready</div>
  </header>

  <main class="verseWrap">
    <div class="verse" id="verse" aria-label="Verse text"></div>
  </main>

  <footer>
    <div class="controls">
      <button id="btnPrev" disabled>◀ Previous</button>
      <button id="btnReplay" disabled>⟲ Replay</button>
      <button id="btnNext">Next ▶</button>
    </div>

    <div class="small">
      <label>Voice: <select id="voiceSelect" aria-label="Voice"></select></label>
      <label>Rate:
        <input id="rate" type="range" min="0.6" max="1.4" step="0.05" value="0.75" />
        <span id="rateVal">1.00</span>
      </label>
    </div>
  </footer>
</div>

<script>
  const verseEl = document.getElementById("verse");
  const statusEl = document.getElementById("status");

  const btnPrev = document.getElementById("btnPrev");
  const btnReplay = document.getElementById("btnReplay");
  const btnNext = document.getElementById("btnNext");

  const voiceSelect = document.getElementById("voiceSelect");
  const rateEl = document.getElementById("rate");
  const rateVal = document.getElementById("rateVal");

  const verseText =
    "I, Nephi, having been born of goodly parents, therefore I was taught somewhat in all the learning of my father; " +
    "and having seen many afflictions in the course of my days, nevertheless, having been highly favored of the Lord " +
    "in all my days; yea, having had a great knowledge of the goodness and the mysteries of God, therefore I make a record " +
    "of my proceedings in my days.";

  let segments = [];
  let segSpans = [];
  let currentSegIndex = 0;
  let speaking = false;

  function setStatus(msg){ statusEl.textContent = msg; }

  function updateButtons(){
    btnPrev.disabled = speaking || currentSegIndex <= 0;
    btnNext.disabled = speaking || currentSegIndex >= segments.length - 1;
    btnReplay.disabled = speaking || segments.length === 0;
  }

  function setActiveSegment(i){
    if (segSpans[currentSegIndex]) segSpans[currentSegIndex].classList.remove("active");
    currentSegIndex = Math.max(0, Math.min(i, segments.length - 1));
    if (segSpans[currentSegIndex]) segSpans[currentSegIndex].classList.add("active");
    updateButtons();
  }

  function getSelectedVoice(){
    const name = voiceSelect.value;
    const voices = speechSynthesis.getVoices() || [];
    return voices.find(v => v.name === name) || null;
  }

  function splitIntoSegments(text){
    const s = text.replace(/\s+/g, " ").trim();
    const re = /[^,;:.!?]+(?:[,;:.!?]+|$)/g;
    const matches = s.match(re) || [];
    return matches.map(x => x.trim()).filter(Boolean);
  }

  function renderSegmentWords(span, segText){
    // Render each word with alternating style for visual differentiation
    const words = segText.split(/\s+/).filter(Boolean);
    span.textContent = ""; // clear

    words.forEach((w, idx) => {
      const ws = document.createElement("span");
      ws.className = "word " + (idx % 2 === 0 ? "w0" : "w1");
      ws.textContent = w;
      span.appendChild(ws);
      if (idx < words.length - 1) span.appendChild(document.createTextNode(" "));
    });
  }

  function renderSegments(){
    segments = splitIntoSegments(verseText);
    verseEl.innerHTML = "";
    segSpans = [];

    segments.forEach((seg, i) => {
      const span = document.createElement("span");
      span.className = "seg";
      renderSegmentWords(span, seg);

      // Tap to jump + play
      span.addEventListener("click", () => speakSegment(i));

      verseEl.appendChild(span);
      verseEl.appendChild(document.createTextNode(" "));
      segSpans.push(span);
    });

    currentSegIndex = 0;
    segSpans[0]?.classList.add("active");
    updateButtons();
  }

  function makeUtterance(text){
    const u = new SpeechSynthesisUtterance(text);
    u.rate = Number(rateEl.value) || 1.0;
    u.pitch = 1;
    u.lang = "en-US";
    const voice = getSelectedVoice();
    if (voice) u.voice = voice;
    return u;
  }

  function stopSpeech(){
    speechSynthesis.cancel();
    speaking = false;
    updateButtons();
  }

  function speakSegment(index){
    if (!segments.length) return;

    stopSpeech();
    setActiveSegment(index);

    const segText = segments[currentSegIndex];
    speaking = true;
    setStatus(`Speaking… (${currentSegIndex + 1}/${segments.length})`);
    updateButtons();

    const u = makeUtterance(segText);

    u.onend = () => {
      speaking = false;
      setStatus("Ready");
      updateButtons();
    };
    u.onerror = (e) => {
      speaking = false;
      setStatus("TTS error: " + (e.error || "unknown"));
      updateButtons();
    };

    speechSynthesis.speak(u);
  }

  btnPrev.addEventListener("click", () => speakSegment(currentSegIndex - 1));
  btnReplay.addEventListener("click", () => speakSegment(currentSegIndex));
  btnNext.addEventListener("click", () => speakSegment(currentSegIndex + 1));

  rateEl.addEventListener("input", () => {
    rateVal.textContent = Number(rateEl.value).toFixed(2);
  });

  function loadVoices(){
    const voices = speechSynthesis.getVoices() || [];
    voiceSelect.innerHTML = "";

    const sorted = [...voices].sort((a,b)=>{
      const aEn = (a.lang||"").toLowerCase().startsWith("en");
      const bEn = (b.lang||"").toLowerCase().startsWith("en");
      if (aEn !== bEn) return aEn ? -1 : 1;
      return (a.name||"").localeCompare(b.name||"");
    });

    for (const v of sorted){
      const opt = document.createElement("option");
      opt.value = v.name;
      opt.textContent = `${v.name} (${v.lang})`;
      voiceSelect.appendChild(opt);
    }

    // Prefer Google UK English Male if available
    const preferred = sorted.find(v => v.name === "Google UK English Male");
    if (preferred) voiceSelect.value = preferred.name;
    else {
      const enGB = sorted.find(v => (v.lang||"").toLowerCase().startsWith("en-gb"));
      if (enGB) voiceSelect.value = enGB.name;
      else {
        const enAny = sorted.find(v => (v.lang||"").toLowerCase().startsWith("en"));
        if (enAny) voiceSelect.value = enAny.name;
        else voiceSelect.value = sorted[0]?.name || "";
      }
    }

    setStatus(sorted.length ? "Ready" : "No voices found (check TTS availability)");
  }

  // Init
  renderSegments();
  rateVal.textContent = Number(rateEl.value).toFixed(2);

  if (typeof speechSynthesis !== "undefined") {
    loadVoices();
    speechSynthesis.onvoiceschanged = () => loadVoices();
  } else {
    setStatus("SpeechSynthesis not supported in this browser");
    btnPrev.disabled = btnReplay.disabled = btnNext.disabled = true;
  }

  window.addEventListener("pagehide", stopSpeech);
</script>
</body>
</html>
