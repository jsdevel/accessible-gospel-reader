<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Verse Read-Along (Portrait)</title>
  <style>
    :root{
      --bg:#0b0f14; --fg:#eef2f7; --muted:#a9b4c0;
      --hl:#ffe27a; --hlBg:rgba(255,226,122,.18);
      --btnBg:rgba(255,255,255,.08); --btnBgHover:rgba(255,255,255,.12);
      --btnBorder:rgba(255,255,255,.14);
      --w0Bg: rgba(255,255,255,0.06);
      --w1Bg: rgba(255,255,255,0.00);
    }

    *{box-sizing:border-box}
    html,body{height:100%;margin:0}
    body{
      background:var(--bg);
      color:var(--fg);
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;
      overflow:hidden; /* page itself doesn't scroll */
      touch-action: manipulation;
    }

    /* Portrait-first layout: top bar, scrollable verse, bottom bar */
    .app{
      height:100dvh;
      width:100vw;
      display:flex;
      flex-direction:column;
    }

    .topbar{
      flex:0 0 auto;
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding: 10px 12px;
      gap: 10px;
      border-bottom: 1px solid rgba(255,255,255,.08);
    }

    .top-left{
      display:flex;
      align-items:center;
      gap:10px;
      min-width: 0;
    }

    .ref{
      font-weight:800;
      font-size:16px;
      letter-spacing:.2px;
      white-space:nowrap;
    }

    .status{
      color:var(--muted);
      font-size:12px;
      white-space:nowrap;
    }

    .top-actions{
      display:flex;
      gap:8px;
      align-items:center;
      flex:0 0 auto;
    }

    .iconbtn{
      appearance:none;
      border:1px solid var(--btnBorder);
      background:var(--btnBg);
      color:var(--fg);
      border-radius:12px;
      width:44px;
      height:44px;
      font-size:20px;
      font-weight:850;
      display:flex;
      align-items:center;
      justify-content:center;
      cursor:pointer;
      transition:background 120ms ease;
      user-select:none;
    }
    .iconbtn:hover{background:var(--btnBgHover)}
    .iconbtn:active{transform:translateY(.5px)}
    .iconbtn:disabled{opacity:.5;cursor:not-allowed}

    .verseWrap{
      flex:1 1 auto;
      min-height:0; /* critical so inner scroll works */
      padding: 14px 12px;
    }

    /* This is the only scrolling area */
    .verseScroll{
      height:100%;
      overflow:auto;
      -webkit-overflow-scrolling: touch;
      padding: 6px 4px 18px 4px;
      scrollbar-width: thin;
    }

    .verse{
      width: 100%;
      max-width: 720px;
      margin: 0 auto;
      font-size: clamp(22px, 4.4vw, 40px);
      line-height: 1.35;
      letter-spacing: .2px;
      text-wrap: pretty;
      user-select:none;
    }

    .seg{
      padding:.05em .14em;
      border-radius:.40em;
      transition:background 120ms linear,color 120ms linear, outline-color 120ms linear;
    }
    .seg.active{
      background: var(--hlBg);
      color: var(--hl);
      outline: 1px solid rgba(255,226,122,.35);
      outline-offset: 1px;
    }

    .word{
      display:inline-block;
      padding:.03em .10em;
      border-radius:.28em;
      margin: 0 .03em 0 0;
    }
    .word.w0{ background: var(--w0Bg); }
    .word.w1{ background: var(--w1Bg); }
    .seg.active .word.w0{ background: rgba(255,255,255,0.10); }
    .seg.active .word.w1{ background: rgba(255,255,255,0.03); }

    .bottombar{
      flex:0 0 auto;
      display:flex;
      align-items:center;
      justify-content:space-around;
      gap: 10px;
      padding: 10px 12px calc(10px + env(safe-area-inset-bottom));
      border-top: 1px solid rgba(255,255,255,.08);
      background: rgba(11,15,20,.98);
      backdrop-filter: blur(8px);
    }

    /* Make bottom buttons big + easy */
    .navbtn{
      width: 64px;
      height: 54px;
      border-radius: 16px;
      font-size: 24px;
    }

    .hint{
      position: fixed;
      left: 50%;
      transform: translateX(-50%);
      bottom: calc(76px + env(safe-area-inset-bottom));
      color: rgba(255,255,255,.65);
      font-size: 12px;
      pointer-events:none;
      opacity:0;
      transition: opacity 200ms ease;
    }
    .hint.show{opacity:1}

    /* Soft nudge: if landscape, show an overlay */
    .rotateOverlay{
      position:fixed;
      inset:0;
      background: rgba(0,0,0,.72);
      display:none;
      align-items:center;
      justify-content:center;
      padding: 24px;
      text-align:center;
      z-index: 50;
    }
    .rotateOverlay .card{
      max-width: 420px;
      background: rgba(11,15,20,.94);
      border: 1px solid rgba(255,255,255,.14);
      border-radius: 18px;
      padding: 18px 16px;
      color: var(--fg);
    }
    .rotateOverlay .title{
      font-weight: 850;
      font-size: 18px;
      margin-bottom: 6px;
    }
    .rotateOverlay .sub{
      color: var(--muted);
      font-size: 14px;
      line-height: 1.35;
    }

    @media (orientation: landscape){
      .rotateOverlay{display:flex;}
    }

    @media (prefers-reduced-motion: reduce){
      .seg{transition:none}
      .iconbtn:active{transform:none}
      .hint{transition:none}
    }
  </style>
</head>
<body>
<div class="app">
  <!-- TOP ROW: placeholder nav buttons (left, up, right triangles) -->
  <div class="topbar">
    <div class="top-left">
      <div class="ref">1 Nephi 1:1</div>
      <div class="status" id="status">Ready</div>
    </div>

    <div class="top-actions" aria-label="Navigation placeholders">
      <button class="iconbtn" id="btnTopLeft" title="Left (placeholder)" aria-label="Left (placeholder)">◀</button>
      <button class="iconbtn" id="btnTopUp" title="Up (placeholder)" aria-label="Up (placeholder)">▲</button>
      <button class="iconbtn" id="btnTopRight" title="Right (placeholder)" aria-label="Right (placeholder)">▶</button>
    </div>
  </div>

  <!-- SCROLLABLE VERSE AREA -->
  <div class="verseWrap">
    <div class="verseScroll" id="verseScroll">
      <div class="verse" id="verse" aria-label="Verse text"></div>
    </div>
  </div>

  <!-- BOTTOM: 3 buttons, symbols only -->
  <div class="bottombar" aria-label="Playback controls">
    <button class="iconbtn navbtn" id="btnPrev" title="Previous segment" aria-label="Previous segment">◀</button>
    <button class="iconbtn navbtn" id="btnReplay" title="Replay segment" aria-label="Replay segment">⟲</button>
    <button class="iconbtn navbtn" id="btnNext" title="Next segment" aria-label="Next segment">▶</button>
  </div>
</div>

<div class="hint" id="hint">Speaking…</div>

<div class="rotateOverlay" aria-hidden="true">
  <div class="card">
    <div class="title">Rotate to portrait</div>
    <div class="sub">This app is designed for portrait mode for easier reading.</div>
  </div>
</div>

<script>
  // --- Portrait locking (best effort) ---
  // This only works in some environments (often installed PWAs / fullscreen),
  // but it won't break anything if unsupported.
  async function tryLockPortrait() {
    try {
      if (screen.orientation && screen.orientation.lock) {
        await screen.orientation.lock("portrait");
      }
    } catch (_) { /* ignore */ }
  }
  window.addEventListener("load", tryLockPortrait);
  document.addEventListener("visibilitychange", () => {
    if (!document.hidden) tryLockPortrait();
  });

  // --- Elements ---
  const verseEl = document.getElementById("verse");
  const verseScroll = document.getElementById("verseScroll");
  const statusEl = document.getElementById("status");
  const hintEl = document.getElementById("hint");

  const btnPrev = document.getElementById("btnPrev");
  const btnReplay = document.getElementById("btnReplay");
  const btnNext = document.getElementById("btnNext");

  // Placeholder buttons (do nothing for now)
  document.getElementById("btnTopLeft").addEventListener("click", () => {});
  document.getElementById("btnTopUp").addEventListener("click", () => {});
  document.getElementById("btnTopRight").addEventListener("click", () => {});

  // --- Content ---
  // 1 Nephi 1:1 (LDS scripture text)
  const verseText =
    "I, Nephi, having been born of goodly parents, therefore I was taught somewhat in all the learning of my father; " +
    "and having seen many afflictions in the course of my days, nevertheless, having been highly favored of the Lord " +
    "in all my days; yea, having had a great knowledge of the goodness and the mysteries of God, therefore I make a record " +
    "of my proceedings in my days.";

  // --- Segment player state ---
  let segments = [];
  let segSpans = [];
  let currentSegIndex = 0;
  let speaking = false;

  function setStatus(msg) { statusEl.textContent = msg; }
  function showHint(msg) {
    hintEl.textContent = msg;
    hintEl.classList.add("show");
    clearTimeout(showHint._t);
    showHint._t = setTimeout(() => hintEl.classList.remove("show"), 800);
  }

  function updateButtons() {
    btnPrev.disabled = speaking || currentSegIndex <= 0;
    btnNext.disabled = speaking || currentSegIndex >= segments.length - 1;
    btnReplay.disabled = speaking || segments.length === 0;
  }

  function setActiveSegment(i) {
    if (segSpans[currentSegIndex]) segSpans[currentSegIndex].classList.remove("active");
    currentSegIndex = Math.max(0, Math.min(i, segments.length - 1));
    if (segSpans[currentSegIndex]) segSpans[currentSegIndex].classList.add("active");
    updateButtons();
    // Keep active segment visible in scroll area (gentle, not required)
    segSpans[currentSegIndex]?.scrollIntoView({ block: "center", inline: "nearest", behavior: "smooth" });
  }

  function splitIntoSegments(text) {
    const s = text.replace(/\s+/g, " ").trim();
    const re = /[^,;:.!?]+(?:[,;:.!?]+|$)/g;
    const matches = s.match(re) || [];
    return matches.map(x => x.trim()).filter(Boolean);
  }

  function renderSegmentWords(span, segText) {
    const words = segText.split(/\s+/).filter(Boolean);
    span.textContent = "";
    words.forEach((w, idx) => {
      const ws = document.createElement("span");
      ws.className = "word " + (idx % 2 === 0 ? "w0" : "w1");
      ws.textContent = w;
      span.appendChild(ws);
      if (idx < words.length - 1) span.appendChild(document.createTextNode(" "));
    });
  }

  function renderSegments() {
    segments = splitIntoSegments(verseText);
    verseEl.innerHTML = "";
    segSpans = [];

    segments.forEach((seg, i) => {
      const span = document.createElement("span");
      span.className = "seg";
      renderSegmentWords(span, seg);

      // Tap a segment to jump + play it (helps accessibility)
      span.addEventListener("click", () => speakSegment(i));

      verseEl.appendChild(span);
      verseEl.appendChild(document.createTextNode(" "));
      segSpans.push(span);
    });

    currentSegIndex = 0;
    segSpans[0]?.classList.add("active");
    updateButtons();
  }

  function stopSpeech() {
    speechSynthesis.cancel();
    speaking = false;
    updateButtons();
  }

  function makeUtterance(text) {
    const u = new SpeechSynthesisUtterance(text);
    // Keep defaults simple for now; you can reintroduce voice/rate later if needed.
    u.lang = "en-GB";
    u.rate = 0.90;
    return u;
  }

  function speakSegment(index) {
    if (!segments.length) return;

    stopSpeech();
    setActiveSegment(index);

    const segText = segments[currentSegIndex];
    speaking = true;
    setStatus(`${currentSegIndex + 1}/${segments.length}`);
    showHint("Speaking…");
    updateButtons();

    const u = makeUtterance(segText);

    u.onend = () => {
      speaking = false;
      setStatus("Ready");
      updateButtons();
    };
    u.onerror = () => {
      speaking = false;
      setStatus("TTS error");
      updateButtons();
    };

    speechSynthesis.speak(u);
  }

  // Bottom controls: symbols only
  btnPrev.addEventListener("click", () => speakSegment(currentSegIndex - 1));
  btnReplay.addEventListener("click", () => speakSegment(currentSegIndex));
  btnNext.addEventListener("click", () => speakSegment(currentSegIndex + 1));

  // Init
  if (typeof speechSynthesis === "undefined") {
    setStatus("No TTS");
    btnPrev.disabled = btnReplay.disabled = btnNext.disabled = true;
  } else {
    setStatus("Ready");
  }
  renderSegments();

  // Safety: stop speech when leaving
  window.addEventListener("pagehide", stopSpeech);
</script>
</body>
</html>
